name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npx electron-vite build

      - run: npx electron-builder --win

      - name: Create GitHub Release
        shell: pwsh
        run: gh release create "${{ github.ref_name }}" release/*.exe release/*.exe.blockmap release/latest.yml --title "${{ github.ref_name }}" --generate-notes
