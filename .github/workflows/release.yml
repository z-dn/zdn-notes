name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run dist -- --win.sign=false

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ZDNotes-Setup-*.exe
            release/ZDNotes-Setup-*.exe.blockmap
            release/latest.yml
          generate_release_notes: true
